# Build + push the SAP-2-NMOS Docker image to Docker Hub.
#
# Triggers:
#   - every push to main        → :latest, :<version from sap2nmos/__init__.py>, :main-<sha>
#   - git tag `v*`              → :<tag-without-leading-v>, :latest
#   - manual workflow_dispatch  → same as push
#
# Required GitHub repo secrets:
#   - DOCKERHUB_TOKEN  : Docker Hub access token from
#                        https://hub.docker.com/settings/security
#                        (NOT your Docker Hub password)
#
# Hardcoded — change here if you ever rename the Docker Hub repo:
#   - Username  : gemini2350
#   - Image repo: gemini2350/sap2nmos

name: Docker

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements-docker.txt pytest
      - name: Run tests
        run: pytest -q

  build-and-push:
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from sap2nmos/__init__.py
        id: version
        run: |
          v=$(sed -n 's/__version__ = "\(.*\)"/\1/p' sap2nmos/__init__.py)
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Image version: $v"

      # The image only pip-installs pure-Python packages, so the arm64
      # cross-build under QEMU is cheap — unlike the Crosspoint image.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: gemini2350
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker tags / labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: gemini2350/sap2nmos
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.version.outputs.version }},enable={{is_default_branch}}
            type=sha,prefix=main-,format=short,enable={{is_default_branch}}
            type=match,pattern=v(.*),group=1
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
